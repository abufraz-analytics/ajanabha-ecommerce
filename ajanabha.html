<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ajanabha E-Commerce</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #f8fafc; color: #1e293b; padding-bottom: 60px; }
        nav { background-color: #0f172a; color: white; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .logo { font-size: 24px; font-weight: bold; color: #38bdf8; cursor: pointer; }
        .container { max-width: 1100px; margin: 30px auto; padding: 0 20px; }
        .page-section { display: none; }
        .page-section.active { display: block; }
        .search-wrapper { margin-bottom: 30px; display: flex; justify-content: center; }
        .search-box { width: 100%; max-width: 600px; }
        .search-box input { width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 8px; }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 25px; }
        .product-card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.05); transition: transform 0.2s; }
        .product-card:hover { transform: translateY(-8px); }
        .product-img { width: 100%; height: 220px; object-fit: cover; }
        .product-info { padding: 20px; }
        .buy-btn { width: 100%; padding: 10px; background-color: #0284c7; color: white; border: none; border-radius: 6px; cursor: pointer; margin-top: 10px; }
        .admin-section { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .btn-del { background: #ef4444; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>
    <nav>
        <div class="logo" onclick="switchPage('shopPage')">AJANABHA</div>
        <button id="adminToggleBtn" style="display:none;" onclick="switchPage('adminDashboard')">Admin Dashboard</button>
    </nav>
    <div class="container">
        <div id="shopPage" class="page-section active">
            <div class="search-wrapper"><div class="search-box"><input type="text" id="searchInput" oninput="filterProducts()" placeholder="Search items..."></div></div>
            <div id="productGridDisplay" class="product-grid"></div>
        </div>
        <div id="orderPage" class="page-section">
            <h2 style="margin-bottom:20px;">Customer Details</h2>
            <input type="hidden" id="selectedProductId">
            <input type="text" id="custName" placeholder="Name" style="width:100%; padding:10px; margin-bottom:10px;"><br>
            <input type="text" id="custPhone" placeholder="Phone" style="width:100%; padding:10px; margin-bottom:10px;"><br>
            <textarea id="custAddress" placeholder="Address" style="width:100%; padding:10px; margin-bottom:10px;"></textarea><br>
            <button class="buy-btn" onclick="placeOrder()">Confirm Order</button>
        </div>
        <div id="adminDashboard" class="page-section">
            <div class="admin-section">
                <div><h3>Upload</h3><input type="text" id="prodName" placeholder="Name"><br><input type="number" id="prodPrice" placeholder="Price"><br><input type="file" id="prodImageFile"><br><button class="buy-btn" onclick="addNewProduct()">Upload</button><h3>Products</h3><div id="adminProductGrid"></div></div>
                <div><h3>Orders</h3><div id="adminOrderList"></div></div>
            </div>
        </div>
    </div>
    <script>
        let localProducts = [], savedPassword = "";
        window.onload = () => fetch('/api/products').then(r=>r.json()).then(d=>{localProducts=d; renderProducts(d);});
        window.addEventListener('keydown', (e) => { if(e.ctrlKey && e.shiftKey && e.key === '*') { const p = prompt("Password:"); fetch('/api/products', {headers:{'admin-password':p}}).then(res=>{ if(res.status===200){ savedPassword=p; document.getElementById('adminToggleBtn').style.display="block"; alert("Admin Mode Active"); }}); }});
        function renderProducts(p) { document.getElementById('productGridDisplay').innerHTML = p.map(prod => `<div class="product-card"><img src="${prod.image}" class="product-img"><div class="product-info"><p style="font-weight:bold">${prod.name}</p><p style="color:#0284c7">₹${prod.price}</p><button class="buy-btn" onclick="openOrderPage('${prod._id}')">Buy Now</button></div></div>`).join(''); }
        function openOrderPage(id) { document.getElementById('selectedProductId').value = id; switchPage('orderPage'); }
        function switchPage(id) { document.querySelectorAll('.page-section').forEach(s=>s.classList.remove('active')); document.getElementById(id).classList.add('active'); }
        function loadAdminData() {
            fetch('/api/products').then(r=>r.json()).then(d => document.getElementById('adminProductGrid').innerHTML = d.map(p => `<div style="margin-bottom:10px;"><img src="${p.image}" width="40">${p.name} <button class="btn-del" onclick="deleteProduct('${p._id}')">Delete</button></div>`).join(''));
            fetch('/api/orders', {headers:{'admin-password':savedPassword}}).then(r=>r.json()).then(d => document.getElementById('adminOrderList').innerHTML = d.map(o => `<div style="margin-bottom:10px;"><img src="${o.prodImg}" width="40"><p>${o.prodName}</p><p>${o.name} - ${o.phone}</p><button class="btn-del" onclick="deleteOrder('${o._id}')">Delete</button></div>`).join(''));
        }
        function placeOrder() { fetch('/api/orders', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({productId: document.getElementById('selectedProductId').value, name: document.getElementById('custName').value, phone: document.getElementById('custPhone').value, address: document.getElementById('custAddress').value})}).then(()=>{alert("Order Success!"); switchPage('shopPage');}); }
        function deleteProduct(id) { fetch(`/api/products/${id}`, {method:'DELETE', headers:{'admin-password':savedPassword}}).then(()=>loadAdminData()); }
        function deleteOrder(id) { fetch(`/api/orders/${id}`, {method:'DELETE', headers:{'admin-password':savedPassword}}).then(()=>loadAdminData()); }
        function addNewProduct() { const f = new FormData(); f.append('name', document.getElementById('prodName').value); f.append('price', document.getElementById('prodPrice').value); f.append('productImage', document.getElementById('prodImageFile').files[0]); fetch('/api/products', {method:'POST', headers:{'admin-password':savedPassword}, body:f}).then(()=>loadAdminData()); }
        function filterProducts() { const q = document.getElementById('searchInput').value.toLowerCase(); renderProducts(localProducts.filter(p => p.name.toLowerCase().includes(q))); }
    </script>
</body>
</html>
